<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blitz Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            background: #0f172a; 
            color: white; 
            min-height: 100vh; 
            font-family: 'Inter', sans-serif;
        }
        .glass { 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
        }
        .product-card {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.3);
        }
    </style>
</head>
<body>
    <nav class="p-5 glass sticky top-0 z-50 flex justify-between items-center px-8">
        <h1 class="text-2xl font-bold bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent underline decoration-blue-500/30">
            BLITZ STORE
        </h1>
        <div class="flex items-center gap-4">
            <button class="bg-blue-600 hover:bg-blue-700 px-6 py-2 rounded-full text-sm font-bold transition">Cart</button>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto p-8">
        <div class="flex justify-between items-center mb-10">
            <h2 class="text-3xl font-bold">Latest Products</h2>
            <button onclick="loadProducts()" class="text-sm text-blue-400 hover:text-blue-300 flex items-center gap-2">
                🔄 Refresh
            </button>
        </div>
        
        <div id="product-grid" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-8">
            <div class="col-span-full text-center py-20">
                <p class="text-gray-400 animate-pulse text-lg">Loading products from Database...</p>
            </div>
        </div>
    </div>

    <script>
        // မင်းရဲ့ Web App URL
        const api_url = "https://script.google.com/macros/s/AKfycbx8FXk1F4JPLGaIA-Xj694xDoLc8i3tKeykCiCUvhpGviZUcKT8moBnAE6RY9HdAHVr/exec";

        async function loadProducts() {
            const grid = document.getElementById('product-grid');
            
            try {
                const response = await fetch(api_url);
                const items = await response.json();
                
                grid.innerHTML = ""; // Loading စာသားကို ဖျက်မယ်

                if (!items || items.length === 0) {
                    grid.innerHTML = "<p class='col-span-full text-center text-gray-500 py-10'>No products found in Database.</p>";
                    return;
                }

                items.forEach(item => {
                    // မင်းပြင်ခိုင်းတဲ့ ကုဒ်အပိုင်းကို ဒီမှာ ထည့်သွင်းထားပါတယ်
                    grid.innerHTML += `
                        <div class="glass p-5 rounded-3xl product-card">
                            <img src="${item.img}" 
                                 class="w-full h-44 object-cover rounded-2xl mb-4 shadow-inner" 
                                 alt="${item.name}"
                                 onerror="this.src='https://via.placeholder.com/300?text=Image+Error'">
                            <h3 class="text-lg font-semibold truncate text-gray-100">${item.name}</h3>
                            <p class="text-blue-400 font-bold text-xl mt-2">
                                ${Number(item.price).toLocaleString()} <span class="text-xs">MMK</span>
                            </p>
                            <button class="w-full mt-5 py-3 bg-blue-600/20 border border-blue-500/50 rounded-xl hover:bg-blue-600 hover:text-white transition-all font-bold">
                                Buy Now
                            </button>
                        </div>
                    `;
                });
            } catch (error) {
                console.error("Error:", error);
                grid.innerHTML = `
                    <div class="col-span-full text-center py-10">
                        <p class="text-red-400 mb-2">⚠️ Data ချိတ်ဆက်မှု အဆင်မပြေပါ။</p>
                        <p class="text-xs text-gray-500">Google Sheet မှာ Data ရှိမရှိ သို့မဟုတ် URL မှန်မမှန် ပြန်စစ်ပေးပါ။</p>
                    </div>
                `;
            }
        }

        // Website ပွင့်လာတာနဲ့ ပစ္စည်းတွေကို load လုပ်မယ်
        window.onload = loadProducts;
    </script>
</body>
</html>
