<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blitz Store</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f172a">
    <link rel="apple-touch-icon" href="https://img.icons8.com/fluency/144/lightning-bolt.png">
    <link rel="icon" type="image/png" href="https://img.icons8.com/fluency/48/lightning-bolt.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    
    <style>
        body { 
            background: radial-gradient(circle at top right, #1e293b, #0f172a, #020617);
            color: #f8fafc; 
            height: 100vh; 
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow: hidden; 
            display: flex;
            flex-direction: column;
        }

        .app-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
            max-width: 1600px;
            margin: 0 auto;
            width: 100%;
        }

        main.scrollable-content {
            flex: 1;
            overflow-y: auto;
            height: 100%;
            padding-bottom: 100px;
        }

        .banner-img-fade {
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.8s ease-out, transform 0.8s ease-out;
        }

        .banner-img-fade.show {
            opacity: 1;
            transform: translateY(0);
        }

        .banner-container {
            width: 180px;
            height: fit-content;
            overflow: hidden;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(10px);
            flex-shrink: 0;
            margin-top: 3rem;
        }

        .scroll-wrapper {
            display: flex;
            flex-direction: column;
            gap: 15px;
            animation: scrollVertical 20s linear infinite;
        }

        .scroll-wrapper img {
            width: 100%;
            height: 500px; 
            object-fit: cover;
            border-radius: 20px;
        }

        .banner-mobile { display: none !important; }

        @keyframes scrollVertical {
            0% { transform: translateY(0); }
            100% { transform: translateY(-50%); } 
        }

        .banner-container:hover .scroll-wrapper {
            animation-play-state: paused;
        }

        @media (max-width: 1024px) {
            body { overflow-y: auto; height: auto; }
            .app-layout { 
                flex-direction: column; 
                overflow: visible; 
                padding: 10px;
                gap: 15px;
            }
            main.scrollable-content { 
                overflow: visible; 
                height: auto; 
                padding: 0;
                order: 2;
            }

            .banner-pc { display: none !important; }
            .banner-mobile { display: block !important; }
            aside:nth-of-type(2) { display: none !important; }

            .banner-container {
                display: block !important;
                width: 100%;
                margin-top: 0;
                border-radius: 16px;
                background: rgba(255, 255, 255, 0.03);
            }
            
            aside:nth-of-type(1) { order: 1; }

            .scroll-wrapper {
                flex-direction: row;
                width: max-content;
                animation: scrollHorizontal 15s linear infinite;
                padding: 8px;
                gap: 10px;
            }

            .scroll-wrapper img {
                width: 220px;
                height: 120px;
                flex-shrink: 0;
                border-radius: 12px;
            }

            @keyframes scrollHorizontal {
                0% { transform: translateX(0); }
                100% { transform: translateX(-50%); }
            }

            nav { 
                display: flex;
                flex-wrap: wrap; 
                justify-content: space-between;
                align-items: center;
                gap: 10px; 
                padding: 12px 15px !important; 
            }
            nav h1 { order: 1; font-size: 20px; }
            nav .nav-actions { order: 2; }
            .nav-marquee-container { 
                order: 3; 
                width: 100%; 
                margin: 5px 0 0 0; 
                flex-grow: 0; 
            }
        }

        .discount-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(239, 68, 68, 0.8);
            backdrop-filter: blur(8px);
            color: white;
            padding: 4px 12px;
            border-radius: 12px;
            font-weight: 800;
            font-size: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            z-index: 20;
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
        }

        .nav-marquee-container {
            flex-grow: 1;
            overflow: hidden;
            white-space: nowrap;
            margin: 0 20px;
            background: rgba(37, 99, 235, 0.1);
            border-radius: 12px;
            display: block;
        }

        .marquee-text { 
            display: inline-block; 
            padding-left: 100%; 
            animation: marquee 15s linear infinite; 
            color: #60a5fa; 
            font-weight: 700; 
            padding-top: 8px;
            padding-bottom: 8px;
            font-size: 14px;
        }
        @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }

        .glass { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .product-card {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            background: rgba(30, 41, 59, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .product-card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: rgba(59, 130, 246, 0.5);
            box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.5);
            background: rgba(30, 41, 59, 0.6);
        }

        .cat-btn {
            white-space: nowrap;
            padding: 10px 24px;
            border-radius: 16px;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #94a3b8;
        }

        .cat-btn:hover { background: rgba(255, 255, 255, 0.1); color: white; transform: translateY(-2px); }
        .cat-btn.active {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: white; border-color: #60a5fa;
            box-shadow: 0 4px 20px rgba(37, 99, 235, 0.4);
        }

        .img-slider {
            display: flex; overflow-x: auto; scroll-snap-type: x mandatory;
            gap: 12px; border-radius: 24px; -webkit-overflow-scrolling: touch;
        }

        .slider-item {
            flex: 0 0 100%; scroll-snap-align: start;
            aspect-ratio: 3/4; object-fit: cover; object-position: top; border-radius: 24px; cursor: zoom-in;
        }

        .rotating { animation: rotate 1s linear infinite; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }

        #zoomOverlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95); z-index: 9999;
            align-items: center; justify-content: center; backdrop-filter: blur(15px);
        }

        #zoomOverlay img {
            max-width: 90%; max-height: 85%; object-fit: contain;
            border-radius: 12px; animation: zoomIn 0.3s ease-out; cursor: zoom-out;
        }

        .zoom-nav {
            position: absolute; top: 50%; transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.1); color: white;
            width: 50px; height: 50px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.3s; border: 1px solid rgba(255, 255, 255, 0.2);
            font-size: 20px;
        }
        @keyframes zoomIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>
    <nav class="p-6 glass sticky top-0 z-50 flex justify-between items-center px-4 md:px-16 border-b border-white/5">
        <h1 class="text-2xl md:text-3xl font-extrabold tracking-tighter flex-shrink-0">
            <span class="bg-gradient-to-r from-blue-400 via-indigo-400 to-purple-500 bg-clip-text text-transparent">BLITZ</span>
            <span class="text-white">STORE</span>
        </h1>

        <div id="marquee-box" class="nav-marquee-container">
            <p id="marquee-content" class="marquee-text"></p>
        </div>

        <div class="nav-actions flex items-center gap-2 md:gap-4 flex-shrink-0">
            <a href="guarantee.html" class="flex items-center gap-1.5 glass hover:bg-white/10 px-3 md:px-4 py-2.5 rounded-2xl text-[12px] md:text-xs font-bold transition-all border border-white/10 text-blue-400">
                <span class="material-icons-round text-sm">shield</span> အာမခံ
            </a>

            <button onclick="forceUpdate()" class="glass hover:bg-white/10 px-4 md:px-6 py-2.5 rounded-2xl text-[11px] md:text-sm font-bold transition-all flex items-center gap-2 border border-white/10">
                <span id="refreshIcon">🔄</span> Update
            </button>
        </div>
    </nav>

    <div class="app-layout">
        
        <aside class="banner-container">
            <div class="scroll-wrapper" id="leftBannerWrapper">
                <img src="" class="banner-img-fade banner-pc pc-left-1" fetchpriority="high">
                <img src="" class="banner-img-fade banner-pc pc-left-2" fetchpriority="high">
                <img src="" class="banner-img-fade banner-mobile mobile-left-1" loading="lazy">
                <img src="" class="banner-img-fade banner-mobile mobile-left-2" loading="lazy">
            </div>
        </aside>

        <main class="scrollable-content p-6 md:p-12 no-scrollbar">
            <div class="flex items-center gap-3 overflow-x-auto pb-8 mb-4 no-scrollbar" id="category-list">
                <button onclick="filterProducts('All', this)" class="cat-btn active">All Collection</button>
                <button onclick="filterProducts('Clothing', this)" class="cat-btn">Clothing</button>
                <button onclick="filterProducts('Electronics', this)" class="cat-btn">Electronics</button>
                <button onclick="filterProducts('Shoes', this)" class="cat-btn">Shoes</button>
                <button onclick="filterProducts('လူကြီးကစားစရာအရုပ်', this)" class="cat-btn">လူကြီးကစားစရာ</button>
            </div>

            <div class="mb-10">
                <h2 class="text-3xl md:text-4xl font-black bg-gradient-to-br from-white to-gray-500 bg-clip-text text-transparent" id="grid-title">Latest Products</h2>
            </div>
            
            <div id="product-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-10"></div>
        </main>

        <aside class="banner-container">
            <div class="scroll-wrapper" id="rightBannerWrapper">
                <img src="" class="banner-img-fade banner-pc pc-right-1" fetchpriority="high">
                <img src="" class="banner-img-fade banner-pc pc-right-2" fetchpriority="high">
                <img src="" class="banner-img-fade banner-mobile mobile-right-1" loading="lazy">
                <img src="" class="banner-img-fade banner-mobile mobile-right-2" loading="lazy">
            </div>
        </aside>

    </div>

    <div id="zoomOverlay">
        <div class="zoom-nav left-5" onclick="changeZoomImg(-1)" style="left:20px">❮</div>
        <img id="zoomedImg" src="" onclick="closeZoom()" alt="Zoomed Product">
        <div class="zoom-nav right-5" onclick="changeZoomImg(1)" style="right:20px">❯</div>
    </div>

    <div id="detailModal" class="fixed inset-0 bg-black/60 backdrop-blur-xl z-[100] hidden items-center justify-center p-4">
        <div class="glass max-w-2xl w-full p-2 rounded-[40px] relative overflow-hidden border border-white/10">
            <button onclick="closeModal()" class="absolute top-6 right-6 w-10 h-10 flex items-center justify-center bg-black/20 hover:bg-red-500/80 rounded-full text-white transition-all z-[110] backdrop-blur-md">✕</button>
            <div id="modalContent" class="p-6 max-h-[85vh] overflow-y-auto no-scrollbar"></div>
        </div>
    </div>

    <div id="contactModal" class="fixed inset-0 bg-black/80 backdrop-blur-2xl z-[120] hidden items-center justify-center p-6">
        <div class="glass max-w-sm w-full p-10 rounded-[40px] relative text-center border-white/10">
            <button onclick="closeContactModal()" class="absolute top-6 right-6 text-gray-400 hover:text-white transition-colors">✕</button>
            <div class="w-20 h-20 bg-blue-600/20 rounded-full flex items-center justify-center mx-auto mb-6"><span class="text-3xl">🛍️</span></div>
            <h3 class="text-2xl font-bold mb-2 text-white">Admin သို့ဆက်သွယ်ရန်</h3>
            <p class="text-gray-400 text-sm mb-8">Chatbox ရွေးချယ်ပေးပါ</p>
            <div class="space-y-4">
                <a href="viber://chat?number=+959678276253" class="flex items-center justify-center gap-3 w-full py-4 bg-indigo-600 hover:bg-indigo-500 rounded-2xl font-bold text-white transition-all active:scale-95">
                    <img src="https://img.icons8.com/color/48/viber.png" class="w-6 h-6" alt="Viber"> Viber Chat
                </a>
                <a href="https://t.me/nni223" target="_blank" class="flex items-center justify-center gap-3 w-full py-4 bg-sky-600 hover:bg-sky-500 rounded-2xl font-bold text-white transition-all active:scale-95">
                    <img src="https://img.icons8.com/color/48/telegram-app.png" class="w-6 h-6" alt="Telegram"> Telegram Channel
                </a>
            </div>
        </div>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                .then(reg => console.log('Service Worker Registered!'))
                .catch(err => console.log('Service Worker Failed!', err));
            });
        }

        const api_url = "https://script.google.com/macros/s/AKfycbx8FXk1F4JPLGaIA-Xj694xDoLc8i3tKeykCiCUvhpGviZUcKT8moBnAE6RY9HdAHVr/exec";
        
        let allItems = [];
        let currentZoomImages = [];
        let currentZoomIndex = 0;

        // Force Update function: Cache ကို ကျော်ပြီး data အသစ်ယူဖို့
        async function forceUpdate() {
            localStorage.removeItem('blitz_products');
            await loadProducts(true);
        }

        async function loadProducts(isForced = false) {
            const grid = document.getElementById('product-grid');
            const refreshIcon = document.getElementById('refreshIcon');
            
            // UI Loading state
            if (allItems.length === 0) {
                grid.innerHTML = `
                    <div class="col-span-full text-center py-32">
                        <div class="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
                        <p class="text-gray-400 font-medium tracking-wide">Syncing with Database...</p>
                    </div>`;
            }

            if(refreshIcon) refreshIcon.classList.add('rotating');
            
            try {
                // Cache Buster: URL အဆုံးမှာ timestamp ထည့်ပြီး request အသစ်ဖြစ်အောင်လုပ်ခြင်း
                const finalUrl = `${api_url}?t=${new Date().getTime()}`;
                const response = await fetch(finalUrl, { 
                    method: 'GET',
                    redirect: 'follow',
                    cache: 'no-store' // Browser cache ကို မသုံးခိုင်းခြင်း
                });
                
                const data = await response.json();
                localStorage.setItem('blitz_products', JSON.stringify(data));
                handleMarquee(data);

                if (data.ads) {
                    const pcAdUrl = `${data.ads.pcAd}?t=${new Date().getTime()}`;
                    const mobileAdUrl = `${data.ads.mobileAd}?t=${new Date().getTime()}`;
                    
                    document.querySelectorAll('.pc-left-1, .pc-left-2').forEach(el => el.src = pcAdUrl);
                    document.querySelectorAll('.pc-right-1, .pc-right-2').forEach(el => el.src = pcAdUrl);
                    document.querySelectorAll('.mobile-left-1, .mobile-left-2').forEach(el => el.src = mobileAdUrl);
                    document.querySelectorAll('.mobile-right-1, .mobile-right-2').forEach(el => el.src = mobileAdUrl);

                    document.querySelectorAll('.banner-img-fade').forEach((img, i) => {
                        img.onload = () => setTimeout(() => img.classList.add('show'), i * 100);
                    });
                }
                
                allItems = data.products || data || [];
                if (allItems.length > 0) displayProducts(allItems);

            } catch (error) {
                console.error("Fetch error:", error);
                const cachedData = localStorage.getItem('blitz_products');
                if (cachedData) {
                    const data = JSON.parse(cachedData);
                    allItems = data.products || data;
                    displayProducts(allItems);
                } else {
                    grid.innerHTML = `<div class="col-span-full text-center py-20 text-red-400">⚠️ ချိတ်ဆက်မှု အဆင်မပြေပါ။</div>`;
                }
            } finally {
                if(refreshIcon) refreshIcon.classList.remove('rotating');
            }
        }

        function handleMarquee(data) {
            const box = document.getElementById('marquee-box');
            const content = document.getElementById('marquee-content');
            if (data.isActive && data.announcement) {
                content.innerText = data.announcement;
                box.style.setProperty('display', 'block', 'important');
            } else {
                box.style.display = "none";
            }
        }

        function displayProducts(items) {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = ""; 
            items.forEach(item => {
                const isSold = item.status === "Sold Out";
                const productData = encodeURIComponent(JSON.stringify(item));
                const imgList = [item.img1, item.img2, item.img3].filter(img => img && img.trim() !== "");
                const imgListJSON = JSON.stringify(imgList);

                const originalPrice = Number(item.price); 
                const discountPercent = Number(item.discount || 0);
                const salePrice = hasDiscount(discountPercent) ? originalPrice - Math.round(originalPrice * (discountPercent / 100)) : originalPrice;

                grid.innerHTML += `
                    <div class="product-card p-4 rounded-[32px] flex flex-col ${isSold ? 'opacity-60 grayscale' : ''} relative">
                        <div class="w-full aspect-[3/4] mb-5 overflow-hidden rounded-[24px] relative group bg-slate-800">
                            <span class="absolute top-3 left-3 z-10 bg-black/60 backdrop-blur-md text-[10px] px-3 py-1.5 rounded-full font-bold uppercase border border-white/10">${item.category || 'Luxury'}</span>
                            ${discountPercent > 0 ? `<div class="discount-badge">-${discountPercent}%</div>` : ''}
                            <img src="${item.img1}" onclick='openZoom(${imgListJSON}, 0)' class="w-full h-full object-cover object-top transition-transform duration-700 group-hover:scale-110 cursor-zoom-in">
                            ${isSold ? `<div class="absolute inset-0 flex items-center justify-center bg-black/40"><span class="bg-red-500 text-white px-5 py-2 rounded-full font-black text-xs uppercase">Sold Out</span></div>` : ''}
                        </div>
                        <div class="px-2 flex flex-col flex-grow">
                            <h3 class="text-lg font-bold truncate text-white mb-2">${item.name}</h3>
                            <div class="mb-6">
                                ${discountPercent > 0 ? `<span class="text-gray-500 text-xs line-through block decoration-red-500/50">${originalPrice.toLocaleString()} MMK</span>` : ''}
                                <span class="text-blue-400 font-black text-2xl">${salePrice.toLocaleString()} <span class="text-[10px] text-gray-500">MMK</span></span>
                            </div>
                            <div class="mt-auto flex gap-3">
                                <button onclick="showDetails('${productData}')" class="flex-1 py-3.5 bg-white/5 border border-white/10 rounded-2xl hover:bg-white/10 transition-all font-bold text-xs uppercase text-white">Info</button>
                                <button onclick="openContactModal()" class="flex-[2] py-3.5 bg-blue-600 hover:bg-blue-500 rounded-2xl transition-all font-bold text-white text-xs uppercase" ${isSold ? 'disabled' : ''}>${isSold ? 'Sold Out' : 'Order Now'}</button>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        function hasDiscount(val) { return Number(val) > 0; }

        function filterProducts(category, btn) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const filtered = category === 'All' ? allItems : allItems.filter(item => item.category === category);
            displayProducts(filtered);
            document.getElementById('grid-title').innerText = category === 'All' ? "Latest Products" : category;
        }

        function showDetails(encodedData) {
            const item = JSON.parse(decodeURIComponent(encodedData));
            const modal = document.getElementById('detailModal');
            const content = document.getElementById('modalContent');
            const imgList = [item.img1, item.img2, item.img3].filter(img => img && img.trim() !== "");
            const discount = Number(item.discount || 0);
            const price = Number(item.price);
            const salePrice = discount > 0 ? price - Math.round(price * (discount / 100)) : price;

            content.innerHTML = `
                <div class="flex flex-col md:flex-row gap-8">
                    <div class="md:w-1/2">
                        <div class="img-slider mb-4">
                            ${imgList.map((img, idx) => `<img src="${img}" class="slider-item" onclick='openZoom(${JSON.stringify(imgList)}, ${idx})'>`).join('')}
                        </div>
                        <p class="text-[10px] text-gray-500 text-center font-bold uppercase mb-4">Swipe ↔️ / Click 🔍</p>
                    </div>
                    <div class="md:w-1/2 flex flex-col justify-between">
                        <div class="px-2">
                            <span class="text-blue-500 font-bold text-xs uppercase tracking-widest mb-2">${item.category || 'Luxury'}</span>
                            <h2 class="text-3xl font-black mb-3 text-white leading-tight">${item.name}</h2>
                            <div class="mb-6">
                                ${discount > 0 ? `<span class="text-gray-500 text-sm line-through block decoration-red-500/50">${price.toLocaleString()} MMK</span>` : ''}
                                <span class="text-blue-400 font-black text-3xl">${salePrice.toLocaleString()} <span class="text-sm font-medium text-gray-500">MMK</span></span>
                            </div>
                            <div class="bg-white/5 p-6 rounded-[24px] border border-white/5 h-40 overflow-y-auto mb-8 no-scrollbar">
                                <p class="text-gray-400 text-sm leading-relaxed whitespace-pre-line">${item.desc || 'No description provided.'}</p>
                            </div>
                        </div>
                        <button onclick="openContactModal()" class="w-full py-5 bg-blue-600 hover:bg-blue-500 rounded-2xl font-black text-sm uppercase tracking-widest text-white transition-all">Confirm Order</button>
                    </div>
                </div>
            `;
            modal.classList.remove('hidden'); modal.classList.add('flex');
            document.body.style.overflow = 'hidden';
        }

        function openZoom(images, index = 0) {
            currentZoomImages = Array.isArray(images) ? images : [images];
            currentZoomIndex = index;
            document.getElementById('zoomedImg').src = currentZoomImages[currentZoomIndex];
            document.getElementById('zoomOverlay').style.display = 'flex';
        }

        function changeZoomImg(dir) {
            currentZoomIndex = (currentZoomIndex + dir + currentZoomImages.length) % currentZoomImages.length;
            document.getElementById('zoomedImg').src = currentZoomImages[currentZoomIndex];
        }

        function closeZoom() { document.getElementById('zoomOverlay').style.display = 'none'; }
        function closeModal() { document.getElementById('detailModal').classList.add('hidden'); document.body.style.overflow = 'auto'; }
        function openContactModal() { document.getElementById('contactModal').classList.remove('hidden'); document.getElementById('contactModal').classList.add('flex'); }
        function closeContactModal() { document.getElementById('contactModal').classList.add('hidden'); }

        window.onload = loadProducts;
    </script>
</body>
</html>
