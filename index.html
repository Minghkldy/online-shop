<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blitz Store</title>
    
    <link rel="icon" type="image/png" href="https://img.icons8.com/fluency/48/lightning-bolt.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            background: radial-gradient(circle at top right, #1e293b, #0f172a, #020617);
            color: #f8fafc; 
            min-height: 100vh; 
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow-x: hidden;
        }

        /* Announcement Animation (Inside Nav) */
        .nav-marquee-container {
            flex-grow: 1;
            overflow: hidden;
            white-space: nowrap;
            margin: 0 20px;
            background: rgba(37, 99, 235, 0.1);
            border-radius: 12px;
            display: none; 
        }

        .marquee-text { 
            display: inline-block; 
            padding-left: 100%; 
            animation: marquee 15s linear infinite; 
            color: #60a5fa; 
            font-weight: 700; 
            padding-top: 8px;
            padding-bottom: 8px;
            font-size: 14px;
        }
        @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }

        .glass { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .product-card {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            background: rgba(30, 41, 59, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .product-card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: rgba(59, 130, 246, 0.5);
            box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.5);
            background: rgba(30, 41, 59, 0.6);
        }

        .cat-btn {
            white-space: nowrap;
            padding: 10px 24px;
            border-radius: 16px;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #94a3b8;
        }

        .cat-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            transform: translateY(-2px);
        }

        .cat-btn.active {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: white;
            border-color: #60a5fa;
            box-shadow: 0 4px 20px rgba(37, 99, 235, 0.4);
        }

        .img-slider {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            gap: 12px;
            border-radius: 24px;
            -webkit-overflow-scrolling: touch;
        }

        .slider-item {
            flex: 0 0 100%;
            scroll-snap-align: start;
            height: 350px;
            object-fit: cover;
            border-radius: 24px;
        }

        .rotating { animation: rotate 1s linear infinite; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }

        /* Modal Layout Fix */
        .modal-content-wrapper {
            max-height: 85vh;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <nav class="p-6 glass sticky top-0 z-50 flex justify-between items-center px-8 md:px-16 border-b border-white/5">
        <h1 class="text-3xl font-extrabold tracking-tighter flex-shrink-0">
            <span class="bg-gradient-to-r from-blue-400 via-indigo-400 to-purple-500 bg-clip-text text-transparent">BLITZ</span>
            <span class="text-white">STORE</span>
        </h1>

        <div id="marquee-box" class="nav-marquee-container">
            <p id="marquee-content" class="marquee-text"></p>
        </div>

        <div class="flex items-center gap-4 flex-shrink-0">
            <button id="navRefreshBtn" onclick="loadProducts()" class="glass hover:bg-white/10 px-6 py-2.5 rounded-2xl text-sm font-bold transition-all flex items-center gap-2 border border-white/10">
                <span id="refreshIcon">🔄</span> Update
            </button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-8 md:p-12">
        <div class="flex items-center gap-3 overflow-x-auto pb-8 mb-4 no-scrollbar" id="category-list">
            <button onclick="filterProducts('All', this)" class="cat-btn active">All Collection</button>
            <button onclick="filterProducts('လူကြီးကစားစရာအရုပ်', this)" class="cat-btn">လူကြီးကစားစရာ</button>
            <button onclick="filterProducts('Clothing', this)" class="cat-btn">Clothing</button>
            <button onclick="filterProducts('Electronics', this)" class="cat-btn">Electronics</button>
            <button onclick="filterProducts('Gadgets', this)" class="cat-btn">Gadgets</button>
            <button onclick="filterProducts('Shoes', this)" class="cat-btn">Shoes</button>
            <button onclick="filterProducts('Cosmetics', this)" class="cat-btn">Cosmetics</button>
            <button onclick="filterProducts('Food', this)" class="cat-btn">Food</button>
        </div>

        <div class="mb-10">
            <h2 class="text-4xl font-black bg-gradient-to-br from-white to-gray-500 bg-clip-text text-transparent" id="grid-title">Latest Products</h2>
        </div>
        
        <div id="product-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-10">
            <div class="col-span-full text-center py-32">
                <div class="inline-block p-4 rounded-full bg-blue-500/10 mb-4">
                    <div class="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
                </div>
                <p class="text-gray-400 font-medium tracking-wide">Syncing with Database...</p>
            </div>
        </div>
    </main>

    <div id="detailModal" class="fixed inset-0 bg-black/60 backdrop-blur-xl z-[100] hidden items-center justify-center p-4">
        <div class="glass max-w-2xl w-full p-2 rounded-[40px] relative overflow-hidden border border-white/10">
            <button onclick="closeModal()" class="absolute top-6 right-6 w-10 h-10 flex items-center justify-center bg-black/20 hover:bg-red-500/80 rounded-full text-white transition-all z-[110] backdrop-blur-md">✕</button>
            <div id="modalContent" class="p-6 modal-content-wrapper"></div>
        </div>
    </div>

    <div id="contactModal" class="fixed inset-0 bg-black/80 backdrop-blur-2xl z-[120] hidden items-center justify-center p-6">
        <div class="glass max-w-sm w-full p-10 rounded-[40px] relative text-center border-white/10">
            <button onclick="closeContactModal()" class="absolute top-6 right-6 text-gray-400 hover:text-white transition-colors">✕</button>
            <div class="w-20 h-20 bg-blue-600/20 rounded-full flex items-center justify-center mx-auto mb-6">
                <span class="text-3xl">🛍️</span>
            </div>
            <h3 class="text-2xl font-bold mb-2">မှာယူမည့်နည်းလမ်း</h3>
            <p class="text-gray-400 text-sm mb-8">ဆက်သွယ်ရန် တစ်ခုခုကို ရွေးချယ်ပေးပါ</p>
            <div class="space-y-4">
                <a href="viber://chat?number=+959953262080" class="flex items-center justify-center gap-3 w-full py-4 bg-indigo-600 hover:bg-indigo-500 rounded-2xl font-bold text-white transition-all shadow-lg shadow-indigo-500/20 active:scale-95">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/d/d0/Viber_logo_2018.png" class="w-6 h-6 object-contain" alt="Viber">
                    Viber Chat
                </a>
                <a href="https://t.me/Mm9999ki" target="_blank" class="flex items-center justify-center gap-3 w-full py-4 bg-sky-600 hover:bg-sky-500 rounded-2xl font-bold text-white transition-all shadow-lg shadow-sky-500/20 active:scale-95">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg" class="w-6 h-6" alt="Telegram">
                    Telegram Channel
                </a>
            </div>
        </div>
    </div>

    <script>
        const api_url = "https://script.google.com/macros/s/AKfycbx8FXk1F4JPLGaIA-Xj694xDoLc8i3tKeykCiCUvhpGviZUcKT8moBnAE6RY9HdAHVr/exec";
        let allItems = [];

        function syncAnnouncement() {
            const msg = localStorage.getItem('blitz_msg');
            const isActive = localStorage.getItem('blitz_active') === 'true';
            const box = document.getElementById('marquee-box');
            const content = document.getElementById('marquee-content');

            if (isActive && msg) {
                content.innerText = msg;
                box.style.display = "block";
            } else {
                box.style.display = "none";
            }
        }

        async function loadProducts() {
            const grid = document.getElementById('product-grid');
            const refreshIcon = document.getElementById('refreshIcon');
            if(refreshIcon) refreshIcon.classList.add('rotating');
            
            try {
                const response = await fetch(api_url);
                allItems = await response.json();
                displayProducts(allItems);
            } catch (error) {
                console.error("Error:", error);
                grid.innerHTML = `<div class="col-span-full text-center py-20 text-red-400">⚠️ ချိတ်ဆက်မှု အဆင်မပြေပါ။ ခဏနေမှ ပြန်ကြိုးစားပေးပါ။</div>`;
            } finally {
                if(refreshIcon) refreshIcon.classList.remove('rotating');
            }
        }

        function displayProducts(items) {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = ""; 

            if (!items || items.length === 0) {
                grid.innerHTML = "<p class='col-span-full text-center text-gray-500 py-10'>No products found in this category.</p>";
                return;
            }

            items.forEach(item => {
                const isSold = item.status === "Sold Out";
                const productData = encodeURIComponent(JSON.stringify(item));

                grid.innerHTML += `
                    <div class="product-card p-4 rounded-[32px] flex flex-col ${isSold ? 'opacity-60 grayscale' : ''}">
                        <div class="w-full h-52 mb-5 overflow-hidden rounded-[24px] relative group">
                            <span class="absolute top-3 left-3 z-10 bg-black/60 backdrop-blur-md text-[10px] px-3 py-1.5 rounded-full font-bold uppercase tracking-widest border border-white/10">${item.category || 'Luxury'}</span>
                            <img src="${item.img1}" 
                                 class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" 
                                 alt="${item.name}"
                                 onerror="this.src='https://via.placeholder.com/300?text=No+Image'">
                            ${isSold ? `
                                <div class="absolute inset-0 flex items-center justify-center bg-black/40 backdrop-blur-[2px]">
                                    <span class="bg-red-500 text-white px-5 py-2 rounded-full font-black text-xs tracking-tighter uppercase shadow-2xl">Sold Out</span>
                                </div>
                            ` : ''}
                        </div>
                        
                        <div class="px-2 flex flex-col flex-grow">
                            <h3 class="text-lg font-bold truncate text-white mb-2">${item.name}</h3>
                            <p class="text-blue-400 font-black text-2xl mb-6">
                                ${Number(item.price).toLocaleString()} <span class="text-[10px] text-gray-500 font-bold uppercase tracking-wider">MMK</span>
                            </p>
                            
                            <div class="mt-auto flex gap-3">
                                <button onclick="showDetails('${productData}')" class="flex-1 py-3.5 bg-white/5 border border-white/10 rounded-2xl hover:bg-white/10 transition-all font-bold text-xs uppercase tracking-widest">
                                    Info
                                </button>
                                <button onclick="openContactModal()" class="flex-[2] py-3.5 bg-blue-600 hover:bg-blue-500 rounded-2xl transition-all font-bold text-white text-xs uppercase tracking-widest shadow-lg shadow-blue-500/20 active:scale-95 disabled:bg-gray-800 disabled:text-gray-500 disabled:shadow-none" ${isSold ? 'disabled' : ''}>
                                    ${isSold ? 'Sold Out' : 'Order Now'}
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        function filterProducts(category, btn) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            if (category === 'All') {
                displayProducts(allItems);
                document.getElementById('grid-title').innerText = "Latest Products";
            } else {
                const filtered = allItems.filter(item => item.category === category);
                displayProducts(filtered);
                document.getElementById('grid-title').innerText = category;
            }
        }

        function showDetails(encodedData) {
            const item = JSON.parse(decodeURIComponent(encodedData));
            const modal = document.getElementById('detailModal');
            const content = document.getElementById('modalContent');
            
            let imagesHtml = `<img src="${item.img1}" class="slider-item" onerror="this.src='https://via.placeholder.com/300?text=No+Image'">`;
            if(item.img2) imagesHtml += `<img src="${item.img2}" class="slider-item">`;
            if(item.img3) imagesHtml += `<img src="${item.img3}" class="slider-item">`;

            content.innerHTML = `
                <div class="flex flex-col md:flex-row gap-8">
                    <div class="md:w-1/2">
                        <div class="img-slider mb-4">
                            ${imagesHtml}
                        </div>
                        ${item.img2 ? '<p class="text-[10px] text-gray-500 text-center font-bold tracking-widest uppercase mb-4">Swipe to view more ↔️</p>' : ''}
                    </div>
                    <div class="md:w-1/2 flex flex-col justify-between">
                        <div>
                            <span class="text-blue-500 font-bold text-xs uppercase tracking-[0.2em] mb-2">${item.category || 'Luxury'}</span>
                            <h2 class="text-3xl font-black mb-3 text-white leading-tight">${item.name}</h2>
                            <div class="flex items-center gap-3 mb-6">
                               <p class="text-blue-400 font-black text-3xl">${Number(item.price).toLocaleString()} <span class="text-sm font-medium text-gray-500">MMK</span></p>
                            </div>
                            <div class="bg-white/5 p-6 rounded-[24px] border border-white/5 h-40 overflow-y-auto mb-8 no-scrollbar">
                                <p class="text-gray-400 text-sm leading-relaxed whitespace-pre-line">${item.desc || 'No description provided.'}</p>
                            </div>
                        </div>
                        <button onclick="openContactModal()" class="w-full py-5 bg-blue-600 hover:bg-blue-500 rounded-2xl font-black text-sm uppercase tracking-[0.2em] shadow-2xl shadow-blue-500/40 transition-all active:scale-95">
                            Confirm Order
                        </button>
                    </div>
                </div>
            `;
            modal.classList.remove('hidden'); modal.classList.add('flex');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            const modal = document.getElementById('detailModal');
            modal.classList.add('hidden'); modal.classList.remove('flex');
            document.body.style.overflow = 'auto';
        }

        function openContactModal() {
            document.getElementById('contactModal').classList.remove('hidden');
            document.getElementById('contactModal').classList.add('flex');
        }

        function closeContactModal() {
            document.getElementById('contactModal').classList.add('hidden');
            document.getElementById('contactModal').classList.remove('flex');
        }

        window.onclick = function(event) {
            if (event.target == document.getElementById('detailModal')) closeModal();
            if (event.target == document.getElementById('contactModal')) closeContactModal();
        }

        window.onload = () => {
            syncAnnouncement();
            loadProducts();
            window.addEventListener('storage', syncAnnouncement);
        };
    </script>
</body>
</html>
