<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blitz Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            background: #0f172a; 
            color: white; 
            min-height: 100vh; 
            font-family: 'Inter', sans-serif;
        }
        .glass { 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
        }
        .product-card {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.3);
        }
        .modal-enter { animation: fadeIn 0.3s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        
        .contact-btn { transition: all 0.2s ease; }
        .contact-btn:hover { transform: scale(1.05); }

        /* Rotate animation for refresh icon */
        .rotating { animation: rotate 1s linear infinite; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* Image Slider Styles */
        .img-slider {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            gap: 10px;
            border-radius: 1.5rem;
            -webkit-overflow-scrolling: touch;
        }
        .img-slider::-webkit-scrollbar {
            height: 4px;
        }
        .img-slider::-webkit-scrollbar-thumb {
            background: rgba(59, 130, 246, 0.5);
            border-radius: 10px;
        }
        .slider-item {
            flex: 0 0 100%;
            scroll-snap-align: start;
            height: 300px;
            object-fit: cover;
            border-radius: 1.5rem;
        }
    </style>
</head>
<body>
    <nav class="p-5 glass sticky top-0 z-50 flex justify-between items-center px-8">
        <h1 class="text-2xl font-bold bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent underline decoration-blue-500/30">
            BLITZ STORE
        </h1>
        <div class="flex items-center gap-4">
            <button id="navRefreshBtn" onclick="loadProducts()" class="bg-blue-600 hover:bg-blue-700 px-6 py-2 rounded-full text-sm font-bold transition flex items-center gap-2">
                <span id="refreshIcon">🔄</span> Refresh
            </button>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto p-8">
        <div class="flex justify-between items-center mb-10">
            <h2 class="text-3xl font-bold">Latest Products</h2>
        </div>
        
        <div id="product-grid" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-8">
            <div class="col-span-full text-center py-20">
                <p class="text-gray-400 animate-pulse text-lg">Loading products from Database...</p>
            </div>
        </div>
    </div>

    <div id="detailModal" class="fixed inset-0 bg-black/80 backdrop-blur-md z-[100] hidden items-center justify-center p-5">
        <div class="glass max-w-lg w-full p-8 rounded-[2.5rem] relative modal-enter">
            <button onclick="closeModal()" class="absolute top-6 right-6 text-gray-400 hover:text-white text-2xl z-[110]">✕</button>
            <div id="modalContent"></div>
        </div>
    </div>

    <div id="contactModal" class="fixed inset-0 bg-black/90 backdrop-blur-md z-[120] hidden items-center justify-center p-5">
        <div class="glass max-w-xs w-full p-8 rounded-[2.5rem] relative text-center">
            <button onclick="closeContactModal()" class="absolute top-5 right-5 text-gray-400">✕</button>
            <h3 class="text-xl font-bold mb-6">မှာယူမည့်နည်းလမ်း</h3>
            <div class="space-y-4">
                <a href="viber://chat?number=+959953262080" class="contact-btn flex items-center justify-center gap-3 w-full py-4 bg-[#7360f2] rounded-2xl font-bold text-white shadow-lg shadow-purple-900/20">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/d/d0/Viber_logo_2018.png" class="w-6 h-6 object-contain" alt="Viber">
                    Viber မှ မှာယူမည်
                </a>
                <a href="https://t.me/Mm9999ki" target="_blank" class="contact-btn flex items-center justify-center gap-3 w-full py-4 bg-[#24A1DE] rounded-2xl font-bold text-white shadow-lg shadow-blue-900/20">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg" class="w-6 h-6" alt="Telegram">
                    Telegram မှ မှာယူမည်
                </a>
            </div>
        </div>
    </div>

    <script>
        const api_url = "https://script.google.com/macros/s/AKfycbx8FXk1F4JPLGaIA-Xj694xDoLc8i3tKeykCiCUvhpGviZUcKT8moBnAE6RY9HdAHVr/exec";

        async function loadProducts() {
            const grid = document.getElementById('product-grid');
            const refreshIcon = document.getElementById('refreshIcon');
            
            if(refreshIcon) refreshIcon.classList.add('rotating');
            
            try {
                const response = await fetch(api_url);
                const items = await response.json();
                
                grid.innerHTML = ""; 

                if (!items || items.length === 0) {
                    grid.innerHTML = "<p class='col-span-full text-center text-gray-500 py-10'>No products found.</p>";
                    return;
                }

                items.forEach(item => {
                    const isSold = item.status === "Sold Out";
                    const productData = encodeURIComponent(JSON.stringify(item));

                    grid.innerHTML += `
                        <div class="glass p-5 rounded-3xl product-card flex flex-col ${isSold ? 'opacity-75' : ''}">
                            <div class="w-full h-48 mb-4 overflow-hidden rounded-2xl bg-slate-800 relative">
                                <img src="${item.img1}" 
                                     class="w-full h-full object-cover block ${isSold ? 'grayscale' : ''}" 
                                     alt="${item.name}"
                                     onerror="this.src='https://via.placeholder.com/300?text=No+Image'">
                                ${isSold ? `
                                    <div class="absolute inset-0 flex items-center justify-center bg-black/40">
                                        <span class="bg-red-600 text-white px-4 py-1 rounded-full font-bold text-sm tracking-widest uppercase shadow-lg">Sold Out</span>
                                    </div>
                                ` : ''}
                            </div>
                            
                            <div class="flex flex-col flex-grow">
                                <h3 class="text-lg font-semibold truncate text-gray-100">${item.name}</h3>
                                <p class="text-blue-400 font-bold text-xl mt-2">
                                    ${Number(item.price).toLocaleString()} <span class="text-xs text-gray-400">MMK</span>
                                </p>
                                
                                <div class="mt-auto pt-5 flex gap-2">
                                    <button onclick="showDetails('${productData}')" class="flex-1 py-3 bg-slate-800 border border-slate-700 rounded-xl hover:bg-slate-700 transition-all font-bold text-sm">
                                        Details
                                    </button>
                                    <button onclick="openContactModal()" class="flex-[2] py-3 ${isSold ? 'bg-gray-700 border-gray-600 cursor-not-allowed text-gray-400' : 'bg-blue-600 border-blue-500 hover:bg-blue-500 text-white'} border rounded-xl transition-all font-bold text-center" ${isSold ? 'disabled' : ''}>
                                        ${isSold ? 'Sold Out' : 'Buy Now'}
                                    </button>
                                </div>
                            </div>
                        </div>
                    `;
                });
            } catch (error) {
                console.error("Error:", error);
                grid.innerHTML = `<div class="col-span-full text-center py-10 text-red-400">⚠️ Data ချိတ်ဆက်မှု အဆင်မပြေပါ။</div>`;
            } finally {
                if(refreshIcon) refreshIcon.classList.remove('rotating');
            }
        }

        function showDetails(encodedData) {
            const item = JSON.parse(decodeURIComponent(encodedData));
            const modal = document.getElementById('detailModal');
            const content = document.getElementById('modalContent');
            
            // Build slider HTML only for available images
            let imagesHtml = `<img src="${item.img1}" class="slider-item" onerror="this.src='https://via.placeholder.com/300?text=No+Image'">`;
            if(item.img2) imagesHtml += `<img src="${item.img2}" class="slider-item">`;
            if(item.img3) imagesHtml += `<img src="${item.img3}" class="slider-item">`;

            content.innerHTML = `
                <div class="img-slider mb-4">
                    ${imagesHtml}
                </div>
                ${item.img2 ? '<p class="text-[10px] text-gray-500 text-center mb-4">Slide left to see more images ↔️</p>' : ''}
                
                <h2 class="text-2xl font-bold mb-1 text-white">${item.name}</h2>
                <p class="text-blue-400 font-bold text-2xl mb-4">${Number(item.price).toLocaleString()} MMK</p>
                <div class="bg-slate-900/50 p-4 rounded-2xl border border-white/5 max-h-40 overflow-y-auto mb-6">
                    <p class="text-gray-300 text-sm leading-relaxed whitespace-pre-line">${item.desc || 'No details provided.'}</p>
                </div>
                <button onclick="openContactModal()" class="w-full py-4 bg-blue-600 hover:bg-blue-500 rounded-2xl font-bold shadow-lg shadow-blue-900/40 transition-all active:scale-95">
                    ပစ္စည်းမှာယူမည်
                </button>
            `;
            modal.classList.remove('hidden'); modal.classList.add('flex');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            const modal = document.getElementById('detailModal');
            modal.classList.add('hidden'); modal.classList.remove('flex');
            document.body.style.overflow = 'auto';
        }

        function openContactModal() {
            document.getElementById('contactModal').classList.remove('hidden');
            document.getElementById('contactModal').classList.add('flex');
        }

        function closeContactModal() {
            document.getElementById('contactModal').classList.add('hidden');
            document.getElementById('contactModal').classList.remove('flex');
        }

        window.onclick = function(event) {
            const dModal = document.getElementById('detailModal');
            const cModal = document.getElementById('contactModal');
            if (event.target == dModal) closeModal();
            if (event.target == cModal) closeContactModal();
        }

        window.onload = loadProducts;
    </script>
</body>
</html>
