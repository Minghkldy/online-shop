<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blitz Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0f172a; color: white; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body>
    <nav class="p-5 glass sticky top-0 z-50 flex justify-between">
        <h1 class="text-xl font-bold">BLITZ STORE</h1>
        <div class="space-x-4">
            <a href="#" class="text-gray-300">Home</a>
            <button class="bg-blue-600 px-3 py-1 rounded">Cart</button>
        </div>
    </nav>

    <div class="max-w-6xl mx-auto p-10">
        <h2 class="text-3xl font-bold mb-10">Latest Products</h2>
        <div id="product-grid" class="grid grid-cols-1 md:grid-cols-3 gap-6">
            </div>
    </div>

    <script>
        // နမူနာ ပစ္စည်းစာရင်း
        const items = [
            { name: "Gaming Headset", price: "55,000 MMK", img: "https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=300" },
            { name: "Mechanical Keyboard", price: "75,000 MMK", img: "https://images.unsplash.com/photo-1511467687858-23d96c32e4ae?w=300" }
        ];

        const grid = document.getElementById('product-grid');
        items.forEach(item => {
            grid.innerHTML += `
                <div class="glass p-4 rounded-2xl hover:scale-105 transition">
                    <img src="${item.img}" class="w-full h-40 object-cover rounded-xl mb-4">
                    <h3 class="text-lg font-semibold">${item.name}</h3>
                    <p class="text-blue-400 font-bold">${item.price}</p>
                    <button class="w-full mt-4 py-2 bg-blue-600/20 border border-blue-500 rounded-lg">Buy Now</button>
                </div>
            `;
        });
    </script>
</body>
</html>
