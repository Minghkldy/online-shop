<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Blitz Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; color: white; display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        input { transition: all 0.3s ease; }
        input:focus { border-color: #3b82f6 !important; box-shadow: 0 0 10px rgba(59, 130, 246, 0.3); }
    </style>
</head>
<body class="p-6">
    <div class="max-w-md w-full glass p-8 rounded-[2.5rem] shadow-2xl">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-blue-500 tracking-tight">ADMIN PANEL</h1>
            <p class="text-gray-500 text-sm mt-2">Add new products to your store</p>
        </div>

        <div class="space-y-5">
            <div>
                <label class="text-xs text-gray-400 ml-2 mb-1 block">Product Name</label>
                <input type="text" id="pName" placeholder="e.g. Gaming Mouse" 
                    class="w-full bg-slate-900/50 p-4 rounded-2xl outline-none border border-slate-800 text-white">
            </div>

            <div>
                <label class="text-xs text-gray-400 ml-2 mb-1 block">Price (MMK)</label>
                <input type="number" id="pPrice" placeholder="e.g. 55000" 
                    class="w-full bg-slate-900/50 p-4 rounded-2xl outline-none border border-slate-800 text-white">
            </div>

            <div>
                <label class="text-xs text-gray-400 ml-2 mb-1 block">Image URL</label>
                <input type="text" id="pImg" placeholder="https://link-to-image.jpg" 
                    class="w-full bg-slate-900/50 p-4 rounded-2xl outline-none border border-slate-800 text-white">
            </div>

            <button id="upBtn" onclick="addProduct()" 
                class="w-full bg-blue-600 py-4 rounded-2xl font-bold text-lg hover:bg-blue-500 transition-all active:scale-95 shadow-lg shadow-blue-900/20 mt-4">
                Upload Product
            </button>
            
            <a href="index.html" class="block text-center text-sm text-gray-500 hover:text-gray-300 mt-4">
                ← Back to Store
            </a>
        </div>
    </div>

    <script>
        async function addProduct() {
            const name = document.getElementById('pName').value;
            const price = document.getElementById('pPrice').value;
            const img = document.getElementById('pImg').value;
            const btn = document.getElementById('upBtn');

            // မင်းရဲ့ Web App URL (doGet/doPost ပါတဲ့ URL)
            const api_url = "https://script.google.com/macros/s/AKfycbx8FXk1F4JPLGaIA-Xj694xDoLc8i3tKeykCiCUvhpGviZUcKT8moBnAE6RY9HdAHVr/exec";

            if(!name || !price || !img) {
                alert("အချက်အလက်အားလုံးကို ပြည့်စုံအောင် ဖြည့်ပေးပါဗျ။");
                return;
            }

            btn.disabled = true;
            btn.innerText = "Uploading... Please wait";
            btn.style.opacity = "0.5";

            try {
                // doPost ဆီကို Data ပို့မယ်
                const response = await fetch(api_url, {
                    method: "POST",
                    mode: "no-cors", // Google Script အတွက် no-cors သုံးရပါတယ်
                    cache: "no-cache",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ name, price, img })
                });

                // အောင်မြင်သွားရင်
                alert("✅ ပစ္စည်းတင်ခြင်း အောင်မြင်ပါသည်။");
                
                // Input တွေကို ပြန်ရှင်းမယ်
                document.getElementById('pName').value = "";
                document.getElementById('pPrice').value = "";
                document.getElementById('pImg').value = "";

            } catch (e) {
                console.error(e);
                alert("❌ အမှားအယွင်းတစ်ခု ရှိသွားပါတယ်။ ပြန်ကြိုးစားကြည့်ပါ။");
            } finally {
                btn.disabled = false;
                btn.innerText = "Upload Product";
                btn.style.opacity = "1";
            }
        }
    </script>
</body>
</html>
