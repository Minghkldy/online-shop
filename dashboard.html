<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; color: white; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="p-6">
    <div class="max-w-md w-full glass p-8 rounded-[2rem]">
        <h1 class="text-2xl font-bold text-blue-500 mb-6 text-center">ADMIN PANEL</h1>
        <div class="space-y-4">
            <input type="text" id="pName" placeholder="Product Name" class="w-full bg-slate-900 p-3 rounded-xl outline-none border border-slate-800 focus:border-blue-500 text-white">
            <input type="number" id="pPrice" placeholder="Price (MMK)" class="w-full bg-slate-900 p-3 rounded-xl outline-none border border-slate-800 focus:border-blue-500 text-white">
            <input type="text" id="pImg" placeholder="Image URL (Direct link)" class="w-full bg-slate-900 p-3 rounded-xl outline-none border border-slate-800 focus:border-blue-500 text-white">
            <button id="upBtn" onclick="addProduct()" class="w-full bg-blue-600 py-4 rounded-2xl font-bold hover:bg-blue-500 transition active:scale-95">Upload Product</button>
        </div>
    </div>

    <script>
        async function addProduct() {
            const name = document.getElementById('pName').value;
            const price = document.getElementById('pPrice').value;
            const img = document.getElementById('pImg').value;
            const btn = document.getElementById('upBtn');
            const api_url = "https://script.google.com/macros/s/AKfycbx8FXk1F4JPLGaIA-Xj694xDoLc8i3tKeykCiUVhpGviZUCKt8moBnAE6RY9HdAHVr/exec";

            if(!name || !price || !img) { alert("အကုန်ဖြည့်ပါ"); return; }

            btn.disabled = true;
            btn.innerText = "Uploading...";

            try {
                await fetch(api_url, {
                    method: "POST",
                    mode: "no-cors",
                    body: JSON.stringify({ name, price, img })
                });
                alert("တင်ပြီးပါပြီ! Website ကိုသွားကြည့်ပါ။");
                location.reload();
            } catch (e) {
                alert("Error: " + e);
                btn.disabled = false;
                btn.innerText = "Upload Product";
            }
        }
    </script>
</body>
</html>
