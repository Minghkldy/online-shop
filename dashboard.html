<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Blitz Store</title>

    <link rel="icon" type="image/png" href="https://img.icons8.com/fluency/48/lightning-bolt.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; color: white; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; min-height: 100vh; font-family: 'Inter', sans-serif; padding: 20px; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        input, textarea, select { transition: all 0.3s ease; }
        input:focus, textarea:focus, select:focus { border-color: #3b82f6 !important; box-shadow: 0 0 10px rgba(59, 130, 246, 0.3); }
        
        .toggle-dot { transition: all 0.3s ease-in-out; }
        input:checked ~ .toggle-dot { transform: translateX(100%); background-color: #3b82f6; }

        @media (min-width: 768px) {
            body { padding: 40px 20px; }
        }
    </style>
</head>
<body>
    <div class="max-w-md w-full glass p-6 md:p-8 rounded-[2rem] md:rounded-[2.5rem] shadow-2xl mb-6 border-blue-500/20">
        <div class="flex items-center gap-3 mb-6">
            <span class="text-2xl">📢</span>
            <h2 class="text-lg md:text-xl font-bold text-blue-400 uppercase tracking-wider">Announcement Bar</h2>
        </div>
        
        <div class="space-y-4">
            <div>
                <label class="text-xs text-gray-400 ml-2 mb-1 block">Message (စာသားပြေးရန်)</label>
                <textarea id="annMsg" placeholder="ဥပမာ - ယနေ့ဝယ်ယူသူတိုင်းအတွက် 10% Discount ရှိသည်..." 
                    class="w-full bg-slate-900/50 p-4 rounded-2xl outline-none border border-slate-800 text-white text-sm h-20 resize-none"></textarea>
            </div>

            <div class="flex items-center justify-between p-2">
                <span class="text-sm text-gray-300">Show on Website</span>
                <label for="annStatus" class="flex items-center cursor-pointer">
                    <div class="relative">
                        <input type="checkbox" id="annStatus" class="sr-only">
                        <div class="block bg-slate-800 w-12 h-7 md:w-14 md:h-8 rounded-full"></div>
                        <div class="toggle-dot absolute left-1 top-1 bg-gray-400 w-5 h-5 md:w-6 md:h-6 rounded-full"></div>
                    </div>
                </label>
            </div>

            <button id="annBtn" onclick="updateAnnouncement()" 
                class="w-full bg-blue-600/20 text-blue-400 border border-blue-600/50 py-3 rounded-2xl font-bold hover:bg-blue-600 hover:text-white transition-all active:scale-95 text-sm md:text-base">
                Update Announcement
            </button>
        </div>
    </div>

    <div class="max-w-md w-full glass p-6 md:p-8 rounded-[2rem] md:rounded-[2.5rem] shadow-2xl mb-12">
        <div class="text-center mb-8">
            <h1 class="text-2xl md:text-3xl font-bold text-blue-500 tracking-tight uppercase">Admin Panel</h1>
            <p class="text-gray-500 text-xs md:text-sm mt-2">Add new products with discount pricing</p>
        </div>

        <div class="space-y-4">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                <div>
                    <label class="text-xs text-gray-400 ml-2 mb-1 block">Product Name</label>
                    <input type="text" id="pName" placeholder="e.g. Gaming Mouse" 
                        class="w-full bg-slate-900/50 p-4 rounded-2xl outline-none border border-slate-800 text-white text-sm">
                </div>
                <div>
                    <label class="text-xs text-gray-400 ml-2 mb-1 block">Category</label>
                    <select id="pCat" class="w-full bg-slate-900/50 p-4 rounded-2xl outline-none border border-slate-800 text-white text-sm">
                        <option value="Clothing">Clothing</option>
                        <option value="Electronics">Electronics</option>
                        <option value="Shoes">Shoes</option>
                        <option value="Cosmetics">Cosmetics</option>
                        <option value="လူကြီးကစားစရာအရုပ်">လူကြီးကစားစရာအရုပ်</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="text-xs text-gray-400 ml-2 mb-1 block">Price (MMK)</label>
                    <input type="number" id="pPrice" placeholder="55000" 
                        class="w-full bg-slate-900/50 p-4 rounded-2xl outline-none border border-slate-800 text-white text-sm">
                </div>
                <div>
                    <label class="text-xs text-gray-400 ml-2 mb-1 block">Discount (%)</label>
                    <input type="number" id="pDiscount" placeholder="0" 
                        class="w-full bg-slate-900/50 p-4 rounded-2xl outline-none border border-slate-800 text-white text-sm">
                </div>
            </div>

            <div>
                <label class="text-xs text-gray-400 ml-2 mb-1 block">Product Details</label>
                <textarea id="pDesc" placeholder="Describe the product features..." 
                    class="w-full bg-slate-900/50 p-4 rounded-2xl outline-none border border-slate-800 text-white text-sm h-20 resize-none"></textarea>
            </div>

            <div class="grid grid-cols-1 gap-2">
                <input type="text" id="pImg1" placeholder="Image URL 1 (Main)" class="w-full bg-slate-900/50 p-3 rounded-xl outline-none border border-slate-800 text-white text-xs">
                <input type="text" id="pImg2" placeholder="Image URL 2" class="w-full bg-slate-900/50 p-3 rounded-xl outline-none border border-slate-800 text-white text-xs">
                <input type="text" id="pImg3" placeholder="Image URL 3" class="w-full bg-slate-900/50 p-3 rounded-xl outline-none border border-slate-800 text-white text-xs">
            </div>

            <button id="upBtn" onclick="addProduct()" 
                class="w-full bg-blue-600 py-4 rounded-2xl font-bold text-base md:text-lg hover:bg-blue-500 transition-all active:scale-95 shadow-lg shadow-blue-900/20 mt-4">
                Upload Product
            </button>
            
            <a href="index.html" class="block text-center text-xs text-gray-500 hover:text-gray-300 mt-4">
                ← Back to Store View
            </a>
        </div>
    </div>

    <div class="max-w-6xl w-full px-2">
        <h2 class="text-xl md:text-2xl font-bold text-blue-400 mb-8 text-center uppercase tracking-widest">Current Inventory</h2>
        <div id="admin-product-grid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4 md:gap-6">
            <p class="text-center col-span-full text-gray-500">Loading inventory...</p>
        </div>
    </div>

    <script>
        // Updated Web App Link
        const api_url = "https://script.google.com/macros/s/AKfycbx8FXk1F4JPLGaIA-Xj694xDoLc8i3tKeykCiCUvhpGviZUcKT8moBnAE6RY9HdAHVr/exec";

        window.onload = loadInventory;

        async function updateAnnouncement() {
            const msg = document.getElementById('annMsg').value;
            const isActive = document.getElementById('annStatus').checked;
            const btn = document.getElementById('annBtn');

            if(!msg) return alert("စာသားထည့်ပါဦးဗျ။");
            btn.disabled = true;
            btn.innerText = "Updating...";

            try {
                await fetch(api_url, {
                    method: "POST",
                    mode: "no-cors",
                    body: JSON.stringify({ action: "updateAnnouncement", message: msg, isActive: isActive })
                });
                alert("✅ Announcement Updated!");
            } catch (e) {
                alert("❌ Error updating announcement.");
            } finally {
                btn.disabled = false;
                btn.innerText = "Update Announcement";
            }
        }

        async function loadInventory() {
            const grid = document.getElementById('admin-product-grid');
            try {
                const response = await fetch(api_url);
                const data = await response.json();
                
                if(data.announcement !== undefined) {
                    document.getElementById('annMsg').value = data.announcement;
                    document.getElementById('annStatus').checked = data.isActive;
                }

                grid.innerHTML = ''; 
                const products = data.products || data;

                products.forEach(item => {
                    const isSold = item.status === "Sold Out";
                    const card = document.createElement('div');
                    card.className = `glass p-3 md:p-4 rounded-3xl border ${isSold ? 'border-red-900 opacity-75' : 'border-slate-800'} flex flex-col items-center text-center relative`;
                    
                    const discountBadge = item.discount > 0 ? `<span class="absolute top-2 right-2 bg-red-600 text-[8px] px-2 py-1 rounded-lg font-bold">-${item.discount}%</span>` : '';

                    card.innerHTML = `
                        <span class="absolute top-2 left-2 bg-blue-600/80 backdrop-blur text-[7px] md:text-[8px] px-2 py-1 rounded-full uppercase font-bold z-10">${item.category || 'Other'}</span>
                        ${discountBadge}
                        <div class="w-full h-24 md:h-32 overflow-hidden rounded-2xl mb-3 shadow-inner">
                            <img src="${item.img1}" class="w-full h-full object-cover ${isSold ? 'grayscale' : ''}">
                        </div>
                        <h3 class="font-bold text-[10px] md:text-sm truncate w-full text-gray-100">${item.name}</h3>
                        <p class="text-blue-400 text-[10px] md:text-xs mt-1 font-bold">${Number(item.price).toLocaleString()} MMK</p>
                        <div class="mt-4 flex flex-col gap-2 w-full">
                            ${!isSold ? 
                                `<button onclick="updateStatus(${item.row}, 'markSold')" class="bg-red-600/20 hover:bg-red-600 text-red-500 hover:text-white text-[9px] md:text-[10px] py-2 rounded-xl transition-all">Mark Sold</button>` 
                                : `<span class="bg-red-900/30 text-red-500 text-[9px] md:text-[10px] py-2 rounded-xl font-bold italic text-center">Sold Out</span>`
                            }
                            <button onclick="updateStatus(${item.row}, 'delete')" class="bg-slate-800 hover:bg-gray-700 text-gray-400 text-[9px] md:text-[10px] py-2 rounded-xl transition-all">Delete</button>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            } catch (e) {
                grid.innerHTML = '<p class="text-center col-span-full text-red-500">Failed to load data.</p>';
            }
        }

        async function addProduct() {
            const name = document.getElementById('pName').value;
            const price = document.getElementById('pPrice').value;
            const discount = document.getElementById('pDiscount').value || 0;
            const desc = document.getElementById('pDesc').value;
            const category = document.getElementById('pCat').value;
            const img1 = document.getElementById('pImg1').value;
            const img2 = document.getElementById('pImg2').value;
            const img3 = document.getElementById('pImg3').value;
            const btn = document.getElementById('upBtn');

            if(!name || !price || !img1 || !desc) {
                alert("အချက်အလက်အားလုံးကို ပြည့်စုံအောင် ဖြည့်ပေးပါဗျ။");
                return;
            }

            btn.disabled = true;
            btn.innerText = "Processing...";

            const data = { name, price, discount, desc, category, img1, img2, img3 };

            try {
                await fetch(api_url, {
                    method: "POST",
                    mode: "no-cors",
                    body: JSON.stringify(data)
                });

                alert("✅ ပစ္စည်းတင်ခြင်း အောင်မြင်ပါသည်။");
                
                ['pName', 'pPrice', 'pDiscount', 'pDesc', 'pImg1', 'pImg2', 'pImg3'].forEach(id => document.getElementById(id).value = "");
                setTimeout(loadInventory, 1500);
            } catch (e) {
                alert("❌ အမှားအယွင်းတစ်ခု ရှိသွားပါတယ်။");
            } finally {
                btn.disabled = false;
                btn.innerText = "Upload Product";
            }
        }

        async function updateStatus(row, action) {
            if(!confirm("Are you sure?")) return;
            try {
                await fetch(api_url, {
                    method: "POST",
                    mode: "no-cors",
                    body: JSON.stringify({ action, row })
                });
                alert("Updated!");
                setTimeout(loadInventory, 1500);
            } catch (e) {
                alert("Error updating status");
            }
        }
    </script>
</body>
</html>
