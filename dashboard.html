<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Blitz Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; color: white; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; min-height: 100vh; font-family: 'Inter', sans-serif; padding: 40px 20px; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        input { transition: all 0.3s ease; }
        input:focus { border-color: #3b82f6 !important; box-shadow: 0 0 10px rgba(59, 130, 246, 0.3); }
    </style>
</head>
<body>
    <div class="max-w-md w-full glass p-8 rounded-[2.5rem] shadow-2xl mb-12">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-blue-500 tracking-tight uppercase">Admin Panel</h1>
            <p class="text-gray-500 text-sm mt-2">Add new products to your store</p>
        </div>

        <div class="space-y-5">
            <div>
                <label class="text-xs text-gray-400 ml-2 mb-1 block">Product Name</label>
                <input type="text" id="pName" placeholder="e.g. Gaming Mouse" 
                    class="w-full bg-slate-900/50 p-4 rounded-2xl outline-none border border-slate-800 text-white">
            </div>

            <div>
                <label class="text-xs text-gray-400 ml-2 mb-1 block">Price (MMK)</label>
                <input type="number" id="pPrice" placeholder="e.g. 55000" 
                    class="w-full bg-slate-900/50 p-4 rounded-2xl outline-none border border-slate-800 text-white">
            </div>

            <div>
                <label class="text-xs text-gray-400 ml-2 mb-1 block">Image URL</label>
                <input type="text" id="pImg" placeholder="https://via.placeholder.com/300" 
                    class="w-full bg-slate-900/50 p-4 rounded-2xl outline-none border border-slate-800 text-white">
            </div>

            <button id="upBtn" onclick="addProduct()" 
                class="w-full bg-blue-600 py-4 rounded-2xl font-bold text-lg hover:bg-blue-500 transition-all active:scale-95 shadow-lg shadow-blue-900/20 mt-4">
                Upload Product
            </button>
            
            <a href="index.html" class="block text-center text-sm text-gray-500 hover:text-gray-300 mt-4">
                ← Back to Store View
            </a>
        </div>
    </div>

    <div class="max-w-5xl w-full">
        <h2 class="text-2xl font-bold text-blue-400 mb-6 text-center uppercase tracking-widest">Current Inventory</h2>
        <div id="admin-product-grid" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-6">
            </div>
    </div>

    <script>
        const api_url = "https://script.google.com/macros/s/AKfycbx8FXk1F4JPLGaIA-Xj694xDoLc8i3tKeykCiCUvhpGviZUcKT8moBnAE6RY9HdAHVr/exec";

        window.onload = loadProducts;

        async function loadProducts() {
            const grid = document.getElementById('admin-product-grid');
            grid.innerHTML = '<p class="text-center col-span-full text-gray-500">Loading inventory...</p>';
            
            try {
                const response = await fetch(api_url);
                const data = await response.json();
                grid.innerHTML = ''; 

                data.forEach(item => {
                    const isSold = item.status === "Sold Out";
                    const card = document.createElement('div');
                    card.className = `glass p-4 rounded-3xl border ${isSold ? 'border-red-900 opacity-75' : 'border-slate-800'} flex flex-col items-center text-center relative`;
                    
                    card.innerHTML = `
                        <img src="${item.img}" class="w-full h-32 object-cover rounded-2xl mb-3 shadow-inner ${isSold ? 'grayscale' : ''}">
                        <h3 class="font-bold text-sm truncate w-full text-gray-100">${item.name}</h3>
                        <p class="text-blue-400 text-xs mt-1 font-bold">${item.price} MMK</p>
                        <div class="mt-4 flex gap-2 w-full">
                            ${!isSold ? 
                                `<button onclick="updateStatus(${item.row}, 'markSold')" class="flex-1 bg-red-600/20 hover:bg-red-600 text-red-500 hover:text-white text-[10px] py-2 rounded-xl transition-all">Mark Sold</button>` 
                                : `<span class="flex-1 bg-red-900/30 text-red-500 text-[10px] py-2 rounded-xl font-bold italic">Sold Out</span>`
                            }
                            <button onclick="updateStatus(${item.row}, 'delete')" class="flex-1 bg-slate-800 hover:bg-gray-700 text-gray-400 text-[10px] py-2 rounded-xl transition-all">Delete</button>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            } catch (e) {
                grid.innerHTML = '<p class="text-center col-span-full text-red-500">Failed to load data.</p>';
            }
        }

        async function updateStatus(row, action) {
            if(!confirm("Are you sure?")) return;
            
            try {
                await fetch(api_url, {
                    method: "POST",
                    mode: "no-cors",
                    body: JSON.stringify({ action, row })
                });
                alert("Updated successfully!");
                loadProducts();
            } catch (e) {
                alert("Error updating status");
            }
        }

        async function addProduct() {
            const name = document.getElementById('pName').value;
            const price = document.getElementById('pPrice').value;
            const img = document.getElementById('pImg').value;
            const btn = document.getElementById('upBtn');

            if(!name || !price || !img) {
                alert("အချက်အလက်အားလုံးကို ပြည့်စုံအောင် ဖြည့်ပေးပါဗျ။");
                return;
            }

            btn.disabled = true;
            btn.innerText = "Processing...";
            btn.style.opacity = "0.6";

            const data = { name, price, img };

            try {
                await fetch(api_url, {
                    method: "POST",
                    mode: "no-cors",
                    cache: "no-cache",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(data)
                });

                alert("✅ ပစ္စည်းတင်ခြင်း အောင်မြင်ပါသည်။");
                
                document.getElementById('pName').value = "";
                document.getElementById('pPrice').value = "";
                document.getElementById('pImg').value = "";
                
                loadProducts();

            } catch (e) {
                console.error("Error:", e);
                alert("❌ အမှားအယွင်းတစ်ခု ရှိသွားပါတယ်။");
            } finally {
                btn.disabled = false;
                btn.innerText = "Upload Product";
                btn.style.opacity = "1";
            }
        }
    </script>
</body>
</html>
