<!DOCTYPE html>
<html lang="en">
<head>
     <link rel="icon" type="image/png" href="https://img.icons8.com/fluency/48/lightning-bolt.png">
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Guarantee - Blitz Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    
    <style>
        body { 
            background: radial-gradient(circle at top right, #1e293b, #0f172a, #020617);
            color: #f8fafc; 
            min-height: 100vh; 
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .glass { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .guarantee-card {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .guarantee-card:hover {
            background: rgba(255, 255, 255, 0.07);
            transform: translateY(-5px);
            border-color: rgba(59, 130, 246, 0.4);
        }

        .icon-box {
            width: 50px;
            height: 50px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.5rem;
            background: rgba(59, 130, 246, 0.1);
            color: #60a5fa;
        }

        .gradient-text {
            background: linear-gradient(135deg, #60a5fa 0%, #a855f7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .back-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }
    </style>
</head>
<body class="p-6 md:p-12">

    <div class="max-w-4xl mx-auto mb-16 text-center">
        <div class="flex justify-start mb-8">
            <button onclick="window.history.back()" class="back-btn px-5 py-2 rounded-xl text-gray-400 flex items-center gap-2 text-sm font-semibold">
                <span class="material-icons-round text-sm">arrow_back_ios</span> Back to Store
            </button>
        </div>
        <h1 class="text-5xl font-black mb-6 gradient-text tracking-tight">Blitz Service Guarantee</h1>
        <p class="text-gray-400 text-lg max-w-2xl mx-auto">Blitz Store မှ ဝယ်ယူသူတိုင်း စိတ်အေးချမ်းသာစွာ ဝယ်ယူနိုင်ရန် အကောင်းဆုံးဝန်ဆောင်မှုများဖြင့် အာမခံပါသည်။</p>
    </div>

    <div class="max-w-4xl mx-auto">
        <div class="glass p-10 rounded-[40px] guarantee-card">
            <div class="icon-box text-blue-400">
                <span class="material-icons-round text-3xl">verified_user</span>
            </div>
            <h3 class="text-2xl font-bold mb-6 text-white border-b border-white/10 pb-4">Blitz Store အာမခံချက်များ</h3>
            <p id="guarantee-content" class="text-gray-400 leading-relaxed whitespace-pre-line text-lg">
                အချက်အလက်များကို ရယူနေပါသည်...
            </p>
        </div>
    </div>

    <div class="max-w-4xl mx-auto mt-20 text-center">
        <div class="inline-flex items-center gap-2 px-6 py-3 glass rounded-full border border-blue-500/20">
            <span class="w-2 h-2 rounded-full bg-blue-500 animate-pulse"></span>
            <span class="text-xs font-bold text-gray-400 uppercase tracking-widest">Blitz Store Official Service</span>
        </div>
    </div>

    <script>
        // သင်၏ Apps Script Web App URL ကို ဤနေရာတွင် အစားထိုးပါ
        const API_URL = "https://script.google.com/macros/s/AKfycbx8FXk1F4JPLGaIA-Xj694xDoLc8i3tKeykCiCUvhpGviZUcKT8moBnAE6RY9HdAHVr/exec";

        async function fetchGuarantees() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                
                // Column N (guarantee) မှ အချက်အလက်ကို ရယူပြသခြင်း
                if (data.products && data.products.length > 0) {
                    const guaranteeText = data.products[0].guarantee;
                    document.getElementById('guarantee-content').innerText = guaranteeText || "အာမခံချက် အချက်အလက်များ မရှိသေးပါ။";
                }
            } catch (error) {
                console.error("Error fetching data:", error);
                document.getElementById('guarantee-content').innerText = "ဒေတာဆွဲယူရာတွင် အမှားအယွင်းရှိနေပါသည်။";
            }
        }

        // စာမျက်နှာစတင်ချိန်တွင် function ကို ခေါ်ယူရန်
        window.onload = fetchGuarantees;
    </script>

</body>
</html>
