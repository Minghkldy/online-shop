<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="https://img.icons8.com/fluency/48/lightning-bolt.png">
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Guarantee - Blitz Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    
    <style>
        body { 
            background: radial-gradient(circle at top right, #1e293b, #0f172a, #020617);
            color: #f8fafc; 
            min-height: 100vh; 
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow-x: hidden; /* ဖုန်းမှာ ဘေးဘက်စာသားမထွက်စေရန် */
        }

        .glass { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .guarantee-card {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            width: 100%; /* ဖုန်းဆိုဒ်အတွက် အပြည့်ယူရန် */
        }

        .guarantee-card:hover {
            background: rgba(255, 255, 255, 0.07);
            transform: translateY(-5px);
            border-color: rgba(59, 130, 246, 0.4);
        }

        .icon-box {
            width: 50px;
            height: 50px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.5rem;
            background: rgba(59, 130, 246, 0.1);
            color: #60a5fa;
        }

        .gradient-text {
            background: linear-gradient(135deg, #60a5fa 0%, #a855f7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .back-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        /* ဖုန်းမှာ စာသားတွေ အလိုအလျောက် ဆင်းစေရန် */
        #guarantee-content {
            word-wrap: break-word;
            overflow-wrap: break-word;
            white-space: pre-line;
        }
    </style>
</head>
<body class="p-4 md:p-12"> <div class="max-w-4xl mx-auto mb-10 md:mb-16 text-center">
        <div class="flex justify-start mb-6 md:mb-8">
            <button onclick="window.history.back()" class="back-btn px-4 md:px-5 py-2 rounded-xl text-gray-400 flex items-center gap-2 text-sm font-semibold">
                <span class="material-icons-round text-sm">arrow_back_ios</span> Back to Store
            </button>
        </div>
        <h1 class="text-3xl md:text-5xl font-black mb-4 md:mb-6 gradient-text tracking-tight">Blitz Service Guarantee</h1>
        <p class="text-gray-400 text-base md:text-lg max-w-2xl mx-auto px-2">Blitz Store မှ ဝယ်ယူသူတိုင်း စိတ်အေးချမ်းသာစွာ ဝယ်ယူနိုင်ရန် အကောင်းဆုံးဝန်ဆောင်မှုများဖြင့် အာမခံပါသည်။</p>
    </div>

    <div class="max-w-4xl mx-auto px-2 md:px-0"> <div class="glass p-6 md:p-10 rounded-[30px] md:rounded-[40px] guarantee-card border border-blue-500/20">
            <div class="icon-box text-blue-400">
                <span class="material-icons-round text-3xl">verified_user</span>
            </div>
            <h3 class="text-xl md:text-2xl font-bold mb-4 md:mb-6 text-white border-b border-white/10 pb-4">Blitz Store အာမခံချက်များ</h3>
            <p id="guarantee-content" class="text-gray-400 leading-relaxed text-base md:text-lg">
                အချက်အလက်များကို ရယူနေပါသည်...
            </p>
        </div>
    </div>

    <div class="max-w-4xl mx-auto mt-12 md:mt-20 text-center pb-10">
        <div class="inline-flex items-center gap-2 px-6 py-3 glass rounded-full border border-blue-500/20">
            <span class="w-2 h-2 rounded-full bg-blue-500 animate-pulse"></span>
            <span class="text-[10px] md:text-xs font-bold text-gray-400 uppercase tracking-widest">Blitz Store Official Service</span>
        </div>
    </div>

    <script>
        // သင်၏ Apps Script Web App URL
        const API_URL = "https://script.google.com/macros/s/AKfycbwR53W8iKy4Yu7j0xmM7HML0mY1yZFbBl-5NFzlYI9zrZPQXWWQTzKmNU9VkoW9F4zX/exec";

        async function fetchGuarantees() {
            try {
                // Cache ပြဿနာမရှိစေရန် timestamp ထည့်သွင်းခေါ်ယူခြင်း
                const response = await fetch(API_URL + "?t=" + new Date().getTime());
                const data = await response.json();
                
                // Column N (Index 13) မှ အချက်အလက်ကို ပြသခြင်း
                if (data.products && data.products.length > 0) {
                    const guaranteeText = data.products[0].guarantee;
                    document.getElementById('guarantee-content').innerText = guaranteeText || "အာမခံချက် အချက်အလက်များ မရှိသေးပါ။";
                }
            } catch (error) {
                console.error("Error fetching data:", error);
                document.getElementById('guarantee-content').innerText = "ဒေတာဆွဲယူရာတွင် အမှားအယွင်းရှိနေပါသည်။";
            }
        }

        window.onload = fetchGuarantees;
    </script>

</body>
</html>
